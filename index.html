<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriLoop - Personal Food App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            farm: {
              light: '#f4fbf4',
              DEFAULT: '#e0f2e0',
              dark: '#166534',
              accent: '#22c55e',
            },
            earth: {
              light: '#faf7f2',
              DEFAULT: '#e6ded3',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .glassmorphism {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body class="bg-earth-light text-slate-800 min-h-screen flex flex-col antialiased">
  
  <!-- Header -->
  <header class="sticky top-0 z-50 glassmorphism pt-6 pb-4 px-6 border-b border-earth shadow-sm">
    <div class="max-w-4xl mx-auto flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-farm-dark rounded-xl flex items-center justify-center shadow-lg shadow-farm-dark/30">
          <i data-lucide="leaf" class="text-white w-6 h-6"></i>
        </div>
        <h1 class="text-2xl font-bold text-farm-dark tracking-tight">AgriLoop</h1>
      </div>
      <button class="w-10 h-10 rounded-full bg-white border border-earth flex items-center justify-center text-slate-600 shadow-sm hover:shadow-md transition-shadow">
        <i data-lucide="user" class="w-5 h-5"></i>
      </button>
    </div>
  </header>

  <main class="flex-grow pb-24">
    <!-- Quick Actions Section -->
    <section class="max-w-4xl mx-auto px-6 mt-8">
      <h2 class="text-lg font-semibold text-slate-800 mb-4 px-1">Quick Actions</h2>
      <div class="grid grid-cols-3 gap-3 md:gap-6">
        
        <!-- Action 1 -->
        <button class="group flex flex-col items-center justify-center p-4 md:p-8 bg-white rounded-2xl md:rounded-3xl shadow-sm border border-earth hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
          <div class="w-12 h-12 md:w-16 md:h-16 rounded-full bg-farm-light group-hover:bg-farm text-farm-dark flex items-center justify-center mb-3 transition-colors">
            <i data-lucide="scan-line" class="w-6 h-6 md:w-8 md:h-8"></i>
          </div>
          <span class="text-sm md:text-base font-medium text-slate-700 whitespace-nowrap">Scan Item</span>
        </button>

        <!-- Action 2 -->
        <button class="group flex flex-col items-center justify-center p-4 md:p-8 bg-white rounded-2xl md:rounded-3xl shadow-sm border border-earth hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
          <div class="w-12 h-12 md:w-16 md:h-16 rounded-full bg-orange-50 group-hover:bg-orange-100 text-orange-600 flex items-center justify-center mb-3 transition-colors">
            <i data-lucide="clipboard-list" class="w-6 h-6 md:w-8 md:h-8"></i>
          </div>
          <span class="text-sm md:text-base font-medium text-slate-700 whitespace-nowrap">Farm Log</span>
        </button>

        <!-- Action 3 -->
        <button class="group flex flex-col items-center justify-center p-4 md:p-8 bg-white rounded-2xl md:rounded-3xl shadow-sm border border-earth hover:shadow-xl hover:-translate-y-1 transition-all duration-300">
          <div class="w-12 h-12 md:w-16 md:h-16 rounded-full bg-blue-50 group-hover:bg-blue-100 text-blue-600 flex items-center justify-center mb-3 transition-colors">
            <i data-lucide="recycle" class="w-6 h-6 md:w-8 md:h-8"></i>
          </div>
          <span class="text-sm md:text-base font-medium text-slate-700 whitespace-nowrap">Redistribute</span>
        </button>

      </div>
    </section>

    <!-- Critical Alerts Section -->
    <section class="max-w-4xl mx-auto px-6 mt-12">
      <div class="flex items-center justify-between mb-4 px-1">
        <h2 class="text-lg font-semibold flex items-center gap-2 text-slate-800">
          <i data-lucide="alert-triangle" class="w-5 h-5 text-red-500"></i>
          Critical Alerts
        </h2>
        <a href="#" class="text-sm text-farm-dark font-medium hover:underline">View All</a>
      </div>

      <div class="flex flex-col gap-4">
        
        <!-- Alert Card 1 -->
        <div class="flex items-center p-4 bg-red-50/80 border border-red-200 rounded-2xl shadow-sm relative overflow-hidden group hover:shadow-md transition-shadow">
          <!-- Soft glow effect -->
          <div class="absolute inset-0 bg-gradient-to-r from-red-100/50 to-transparent pointer-events-none"></div>
          
          <img src="https://images.unsplash.com/photo-1592924357228-91a4daadcfea?w=800&auto=format&fit=crop&q=60" alt="Tomatoes" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-xl shadow-sm z-10" />
          
          <div class="ml-4 flex-grow z-10">
            <div class="flex justify-between items-start mb-1">
              <h3 class="font-bold text-slate-800 text-base md:text-lg">Fresh Tomatoes</h3>
              <span class="px-2.5 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full">Expires Today</span>
            </div>
            <p class="text-sm text-slate-600 mb-2">2.5 kg • Harvested 5 days ago</p>
            <div class="flex gap-2">
              <button class="text-xs font-medium px-3 py-1.5 bg-white text-slate-700 border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 transition-colors">Use Now</button>
              <button class="text-xs font-medium px-3 py-1.5 bg-farm-dark text-white rounded-lg shadow-sm hover:bg-farm-dark/90 transition-colors">Redistribute</button>
            </div>
          </div>
        </div>

        <!-- Alert Card 2 -->
        <div class="flex items-center p-4 bg-orange-50/80 border border-orange-200 rounded-2xl shadow-sm relative overflow-hidden group hover:shadow-md transition-shadow">
           <!-- Soft glow effect -->
          <div class="absolute inset-0 bg-gradient-to-r from-orange-100/50 to-transparent pointer-events-none"></div>

          <img src="https://images.unsplash.com/photo-1563636619-e9143da7973b?w=800&auto=format&fit=crop&q=60" alt="Milk" class="w-16 h-16 md:w-20 md:h-20 object-cover rounded-xl shadow-sm z-10" />
          
          <div class="ml-4 flex-grow z-10">
            <div class="flex justify-between items-start mb-1">
              <h3 class="font-bold text-slate-800 text-base md:text-lg">Organic Farm Milk</h3>
              <span class="px-2.5 py-1 bg-orange-100 text-orange-700 text-xs font-bold rounded-full">Expires in 2 days</span>
            </div>
            <p class="text-sm text-slate-600 mb-2">1 Gallon • Logged yesterday</p>
            <div class="flex gap-2">
              <button class="text-xs font-medium px-3 py-1.5 bg-white text-slate-700 border border-slate-200 rounded-lg shadow-sm hover:bg-slate-50 transition-colors">Log Usage</button>
            </div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <!-- Bottom Navigation (Mobile Only Context) -->
  <nav class="fixed bottom-0 w-full glassmorphism border-t border-earth pb-safe pt-2 md:hidden z-50">
    <div class="flex justify-around items-center px-4 pb-2">
      <a href="#" class="flex flex-col items-center p-2 text-farm-dark">
        <i data-lucide="home" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Home</span>
      </a>
      <a href="#" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-600 transition-colors">
        <i data-lucide="package" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Pantry</span>
      </a>
      <div class="relative -top-5">
        <button class="w-14 h-14 bg-farm-dark rounded-full flex items-center justify-center text-white shadow-lg shadow-farm-dark/40 border-4 border-earth-light">
          <i data-lucide="plus" class="w-6 h-6"></i>
        </button>
      </div>
      <a href="#" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-600 transition-colors">
        <i data-lucide="bar-chart-2" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Analytics</span>
      </a>
      <a href="#" class="flex flex-col items-center p-2 text-slate-400 hover:text-slate-600 transition-colors">
        <i data-lucide="bell" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Alerts</span>
      </a>
    </div>
  </nav>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();
  </script>
</body>
</html>
